# Publishes to the npm registry via OIDC trusted publishing when a release is created.
# Requires `id-token: write` here AND a matching trusted publisher configured on npmjs.com
# (owner: rarDevelopment, repo: bluesky-utilities, workflow filename: npm-publish.yml).

name: Node.js Package

on:
  release:
    types: [created]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"
          package-manager-cache: false
      - run: npm ci
      - run: npm publish
